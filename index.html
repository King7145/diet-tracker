<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="飲食記帳">
<meta name="theme-color" content="#ffffff">
<title>飲食記帳</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --accent: #2a78d6;
    --accent-bg: #e6f1fb;
    --accent-text: #185fa5;
    --surface-0: #f5f5f3;
    --surface-1: #efefed;
    --surface-2: #ffffff;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.18);
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;
    --danger: #e34948;
    --danger-bg: #fcebeb;
    --radius: 8px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --accent: #3987e5;
      --accent-bg: #0c2d52;
      --accent-text: #85b7eb;
      --surface-0: #111110;
      --surface-1: #1a1a19;
      --surface-2: #232321;
      --border: rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.18);
      --text-primary: #f5f5f0;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --danger: #e66767;
      --danger-bg: #2d1010;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--surface-0); }
  body { font-family: -apple-system, 'PingFang TC', 'Heiti TC', sans-serif; color: var(--text-primary); }

  .app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; background: var(--surface-0); }

  /* Header / Calendar */
  .header {
    background: var(--surface-2);
    border-bottom: 0.5px solid var(--border);
    padding: calc(var(--safe-top) + 12px) 14px 10px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .month-nav { display: flex; align-items: center; gap: 8px; }
  .month-nav button { background: none; border: none; color: var(--text-primary); font-size: 24px; cursor: pointer; padding: 2px 8px; border-radius: 6px; line-height: 1; }
  .month-nav button:active { background: var(--surface-1); }
  .month-title { font-size: 17px; font-weight: 600; }
  .month-badge { font-size: 12px; color: var(--accent-text); background: var(--accent-bg); padding: 4px 11px; border-radius: 20px; font-weight: 500; }
  .weekdays { display: grid; grid-template-columns: repeat(7,1fr); text-align: center; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .calendar { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
  .dc { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 7px; cursor: pointer; user-select: none; }
  .dc:active { opacity: 0.65; }
  .dc .dn { font-size: 13px; line-height: 1; }
  .dc .da { font-size: 8.5px; color: var(--accent-text); margin-top: 2px; font-weight: 500; }
  .dc.today .dn { background: var(--accent); color: #fff; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; }
  .dc.selected { background: var(--accent-bg); }
  .dc.other .dn { color: var(--text-muted); }

  /* Tab Bar */
  .tab-bar { display: flex; background: var(--surface-2); border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
  .tab { flex: 1; padding: 10px 4px 9px; font-size: 12px; text-align: center; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; user-select: none; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .tab svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Content */
  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 14px calc(var(--safe-bottom) + 14px); }

  /* Diary */
  .date-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .date-label { font-size: 15px; font-weight: 600; }
  .day-total-badge { font-size: 14px; color: var(--accent-text); font-weight: 600; }
  .add-btn { display: flex; align-items: center; justify-content: center; gap: 7px; background: var(--accent); color: #fff; border: none; border-radius: 11px; padding: 11px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 14px; font-family: inherit; }
  .add-btn:active { opacity: 0.82; }
  .add-btn svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; }
  .stats-row { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 14px; }
  .stat-card { background: var(--surface-1); border-radius: 10px; padding: 10px 13px; }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
  .stat-val { font-size: 18px; font-weight: 600; }
  .meal-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin: 10px 0 6px; }
  .entry-card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 11px; padding: 10px 12px; margin-bottom: 7px; display: flex; align-items: center; gap: 10px; }
  .entry-info { flex: 1; min-width: 0; }
  .entry-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-meta { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .entry-price { font-size: 15px; font-weight: 600; color: var(--accent-text); white-space: nowrap; flex-shrink: 0; margin-right: 4px; }
  .entry-actions { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
  .entry-btn { background: none; border: none; color: var(--text-muted); font-size: 14px; cursor: pointer; padding: 6px 8px; border-radius: 6px; line-height: 1; display: flex; align-items: center; justify-content: center; }
  .entry-btn:active { background: var(--surface-1); }
  .entry-btn.del:active { color: var(--danger); background: var(--danger-bg); }
  .empty-state { text-align: center; padding: 36px 20px; color: var(--text-muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* Charts */
  .chart-sec { margin-bottom: 22px; }
  .chart-title { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; }
  .chart-wrap { position: relative; width: 100%; }
  .pie-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .pie-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-secondary); }
  .pie-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

  /* Export */
  .export-sec { }
  .sec-title { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .export-btn { display: flex; align-items: center; gap: 12px; width: 100%; background: var(--surface-2); border: 0.5px solid var(--border-strong); border-radius: 11px; padding: 13px 14px; font-size: 14px; cursor: pointer; color: var(--text-primary); margin-bottom: 10px; text-align: left; font-family: inherit; }
  .export-btn:active { background: var(--surface-1); }
  .export-btn svg { width: 20px; height: 20px; stroke: var(--accent); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .export-btn-label { font-weight: 500; margin-bottom: 2px; }
  .export-btn-desc { font-size: 12px; color: var(--text-muted); }
  .export-note { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 14px; line-height: 1.6; padding: 0 10px; }
  .toast { position: fixed; bottom: calc(var(--safe-bottom) + 80px); left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 9px 18px; border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 200; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.50); z-index: 100; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.22s; }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface-2); border-radius: 20px 20px 0 0; padding: 16px 16px calc(var(--safe-bottom) + 16px); width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch; transform: translateY(40px); transition: transform 0.25s; }
  .modal-overlay.show .modal { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--border-strong); border-radius: 2px; margin: 0 auto 14px; display: block; }
  .modal-title { font-size: 16px; font-weight: 600; text-align: center; margin-bottom: 14px; }
  .form-group { margin-bottom: 12px; }
  .form-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; display: block; font-weight: 500; }
  .form-input { width: 100%; background: var(--surface-1); border: 0.5px solid var(--border-strong); border-radius: 9px; padding: 11px 13px; font-size: 15px; color: var(--text-primary); font-family: inherit; outline: none; -webkit-appearance: none; }
  .form-input:focus { border-color: var(--accent); }

  .mt-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 7px; margin-bottom: 12px; }
  .mt-btn { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 8px; padding: 8px 2px; font-size: 11px; cursor: pointer; text-align: center; color: var(--text-secondary); line-height: 1.4; font-family: inherit; -webkit-appearance: none; }
  .mt-btn.sel { border-color: var(--accent); background: var(--accent-bg); color: var(--accent-text); font-weight: 600; }
  .mt-btn:active { opacity: 0.7; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-btns { display: flex; gap: 9px; margin-top: 14px; }
  .btn-cancel { flex: 1; background: var(--surface-1); border: 0.5px solid var(--border-strong); border-radius: 10px; padding: 13px; font-size: 15px; cursor: pointer; color: var(--text-secondary); font-family: inherit; }
  .btn-cancel:active { opacity: 0.7; }
  .btn-save { flex: 2; background: var(--accent); border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; color: #fff; font-family: inherit; }
  .btn-save:active { opacity: 0.82; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="month-nav">
        <button onclick="changeMonth(-1)" aria-label="上個月">‹</button>
        <span class="month-title" id="monthTitle"></span>
        <button onclick="changeMonth(1)" aria-label="下個月">›</button>
      </div>
      <span class="month-badge" id="monthTotal">本月 0</span>
    </div>
    <div class="weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
    <div class="calendar" id="calendar"></div>
  </div>

  <div class="tab-bar">
    <div class="tab active" id="tab-diary" onclick="switchTab('diary')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      飲食日記
    </div>
    <div class="tab" id="tab-chart" onclick="switchTab('chart')">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg>
      圖表分析
    </div>
    <div class="tab" id="tab-export" onclick="switchTab('export')">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      匯出
    </div>
  </div>

  <div class="content" id="content"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeIfOutside(event)">
  <div class="modal">
    <span class="modal-handle"></span>
    <div class="modal-title" id="modalTitle">記錄飲食</div>
    <div class="form-group">
      <label class="form-label">食物名稱</label>
      <input class="form-input" id="foodName" placeholder="例如：叉燒飯、奶茶" autocomplete="off" />
    </div>
    <div class="form-group">
      <label class="form-label">餐別</label>
      <div class="mt-row" id="mtRow"></div>
    </div>
    <div class="form-group">
      <label class="form-label">價錢</label>
      <input class="form-input" id="foodPrice" type="number" placeholder="0" inputmode="decimal" />
    </div>
    <div class="form-group">
      <label class="form-label">備注（選填）</label>
      <input class="form-input" id="foodNote" placeholder="例如：好食、下次再來" autocomplete="off" />
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveEntry()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MEALS = ['早餐','午餐','下午茶','晚餐'];
const MEAL_ICONS = ['🌅','☀️','🍵','🌙'];
const MEAL_COLORS = ['#2a78d6','#1baf7a','#eda100','#4a3aa7'];

let S = {
  yr: new Date().getFullYear(),
  mo: new Date().getMonth(),
  selDate: new Date().toISOString().split('T')[0],
  meal: '午餐',
  tab: 'diary',
  data: {},
  editIndex: -1
};
let chartInstances = {};

/* ─── Storage ─── */
function load() {
  try { S.data = JSON.parse(localStorage.getItem('foodData') || '{}'); } catch(e) { S.data = {}; }
}
function save() {
  localStorage.setItem('foodData', JSON.stringify(S.data));
}

/* ─── Helpers ─── */
function entries(d) { return S.data[d] || []; }
function dayTotal(d) {
  return entries(d).reduce((s, e) => s + (parseFloat(e.price)||0), 0);
}
function moTotal() {
  const pfx = `${S.yr}-${String(S.mo+1).padStart(2,'0')}`;
  return Object.keys(S.data).filter(d => d.startsWith(pfx)).reduce((s,d) => s + dayTotal(d), 0);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// 核心修正：利用可靠的 YYYY-MM-DD 字串與正斜線替換法，徹底鎖定本地時區，不因跨國時區而差一天
function getDayOfWeek(dateString) {
  return new Date(dateString.replace(/-/g, '/')).getDay();
}

/* ─── Calendar ─── */
function renderCal() {
  const today = new Date().toISOString().split('T')[0];
  
  // 修正日曆首日星期的時區判定
  const firstDateStr = `${S.yr}-${String(S.mo+1).padStart(2,'0')}-01`;
  const first = getDayOfWeek(firstDateStr);
  
  const days = new Date(S.yr, S.mo+1, 0).getDate();
  const prev = new Date(S.yr, S.mo, 0).getDate();
  const mos = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('monthTitle').textContent = `${S.yr}年 ${mos[S.mo]}`;
  document.getElementById('monthTotal').textContent = `本月 ${Math.round(moTotal())}`;
  let h = '';
  for (let i = 0; i < first; i++) {
    h += `<div class="dc other"><span class="dn">${prev-first+1+i}</span></div>`;
  }
  for (let d = 1; d <= days; d++) {
    const ds = `${S.yr}-${String(S.mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const amt = dayTotal(ds);
    let cls = 'dc';
    if (ds === today) cls += ' today';
    if (ds === S.selDate) cls += ' selected';
    h += `<div class="${cls}" onclick="selDate('${ds}')">
      <span class="dn">${d}</span>
      ${amt > 0 ? `<span class="da">${Math.round(amt)}</span>` : ''}
    </div>`;
  }
  const rem = 42 - first - days;
  for (let i = 1; i <= rem && rem < 7; i++) {
    h += `<div class="dc other"><span class="dn">${i}</span></div>`;
  }
  document.getElementById('calendar').innerHTML = h;
}

function selDate(ds) {
  S.selDate = ds;
  renderCal();
  if (S.tab !== 'diary') switchTab('diary');
  else renderContent();
}
function changeMonth(dir) {
  S.mo += dir;
  if (S.mo > 11) { S.mo = 0; S.yr++; }
  if (S.mo < 0) { S.mo = 11; S.yr--; }
  renderCal();
  renderContent();
}

/* ─── Tabs ─── */
function switchTab(t) {
  S.tab = t;
  ['diary','chart','export'].forEach(x => {
    document.getElementById('tab-'+x).classList.toggle('active', x === t);
  });
  renderContent();
}

/* ─── Render ─── */
function renderContent() {
  if (S.tab === 'diary') renderDiary();
  else if (S.tab === 'chart') renderCharts();
  else renderExport();
}

function renderDiary() {
  const ds = S.selDate, ents = entries(ds);
  const [, mo, da] = ds.split('-');
  const wds = ['日','一','二','三','四','五','六'];
  
  // 核心修正：主畫面日記的星期計算，完美對齊日曆
  const dow = getDayOfWeek(ds);
  const tot = dayTotal(ds);
  const grouped = {};
  MEALS.forEach(m => grouped[m] = []);
  ents.forEach(e => { (grouped[e.meal] = grouped[e.meal]||[]).push(e); });

  let h = `<div class="date-hdr">
    <span class="date-label">${parseInt(mo)}月${parseInt(da)}日（週${wds[dow]}）</span>
    ${ents.length ? `<span class="day-total-badge">${Math.round(tot)}</span>` : ''}
  </div>
  <button class="add-btn" onclick="openModal()">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    新增飲食記錄
  </button>`;

  if (ents.length) {
    h += `<div class="stats-row">
      <div class="stat-card"><div class="stat-label">今日支出</div><div class="stat-val" style="color:var(--accent-text)">${Math.round(tot)}</div></div>
    </div>`;
    MEALS.forEach((meal, mi) => {
      const items = grouped[meal];
      if (!items || !items.length) return;
      h += `<div class="meal-label">${MEAL_ICONS[mi]} ${meal}</div>`;
      items.forEach(e => {
        const ri = ents.indexOf(e);
        h += `<div class="entry-card">
          <div class="entry-info">
            <div class="entry-name">${e.name}</div>
            ${e.note ? `<div class="entry-meta">${e.note}</div>` : ''}
          </div>
          <span class="entry-price">${Math.round(parseFloat(e.price)||0)}</span>
          <div class="entry-actions">
            <button class="entry-btn edit" onclick="openModal(${ri})" aria-label="修改">✎</button>
            <button class="entry-btn del" onclick="delEntry('${ds}',${ri})" aria-label="刪除">✕</button>
          </div>
        </div>`;
      });
    });
  } else {
    h += `<div class="empty-state"><div class="icon">🍽️</div><p>今天未有記錄<br>記下你吃了什麼吧！</p></div>`;
  }
  document.getElementById('content').innerHTML = h;
}

function renderCharts() {
  const pfx = `${S.yr}-${String(S.mo+1).padStart(2,'0')}`;
  const days = new Date(S.yr, S.mo+1, 0).getDate();
  const labels = [], barData = [];
  for (let d = 1; d <= days; d++) {
    const ds = `${pfx}-${String(d).padStart(2,'0')}`;
    const t = dayTotal(ds);
    if (t > 0) { labels.push(`${d}日`); barData.push(Math.round(t)); }
  }
  const mealTotals = {};
  MEALS.forEach(m => mealTotals[m] = 0);
  Object.keys(S.data).forEach(d => {
    if (!d.startsWith(pfx)) return;
    entries(d).forEach(e => {
      if (mealTotals[e.meal] !== undefined) mealTotals[e.meal] += (parseFloat(e.price)||0);
    });
  });
  const pieLabels = MEALS.filter(m => mealTotals[m] > 0);
  const pieData = pieLabels.map(m => Math.round(mealTotals[m]));
  const pieColors = MEALS.map((m,i) => MEAL_COLORS[i]).filter((_,i) => mealTotals[MEALS[i]] > 0);
  const pieTotal = pieData.reduce((a,b) => a+b, 0);
  const hasBar = barData.length > 0, hasPie = pieTotal > 0;
  const mos = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  let h = '';
  if (hasBar) {
    const barH = Math.max(200, barData.length * 34 + 60);
    h += `<div class="chart-sec">
      <div class="chart-title">${S.yr}年${mos[S.mo]} — 每日支出</div>
      <div class="chart-wrap" style="height:${barH}px"><canvas id="barChart"></canvas></div>
    </div>`;
  }
  if (hasPie) {
    const legendH = pieLabels.map((l,i) =>
      `<span class="pie-item"><span class="pie-dot" style="background:${pieColors[i]}"></span>${l} ${pieData[i]}</span>`
    ).join('');
    h += `<div class="chart-sec">
      <div class="chart-title">本月各餐別佔比</div>
      <div class="pie-legend">${legendH}</div>
      <div class="chart-wrap" style="height:210px"><canvas id="pieChart"></canvas></div>
    </div>`;
  }
  if (!hasBar && !hasPie) {
    h = `<div class="empty-state" style="padding-top:52px"><div class="icon">📊</div><p>本月未有記錄<br>記下第一筆後就能看圖表！</p></div>`;
  }
  document.getElementById('content').innerHTML = h;
  if (chartInstances.bar) { chartInstances.bar.destroy(); delete chartInstances.bar; }
  if (chartInstances.pie) { chartInstances.pie.destroy(); delete chartInstances.pie; }
  if (hasBar) {
    chartInstances.bar = new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: { labels, datasets: [{ label: '支出', data: barData, backgroundColor: '#2a78d6', borderRadius: 4, borderSkipped: false }] },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => `${c.raw}` } } },
        scales: {
          x: { ticks: { callback: v => `${v}`, color: '#898781', font: { size: 11 } }, grid: { color: 'rgba(128,128,128,0.12)' } },
          y: { ticks: { color: '#898781', font: { size: 11 }, autoSkip: false }, grid: { display: false } }
        }
      }
    });
  }
  if (hasPie) {
    chartInstances.pie = new Chart(document.getElementById('pieChart'), {
      type: 'doughnut',
      data: { labels: pieLabels, datasets: [{ data: pieData, backgroundColor: pieColors, borderWidth: 3, borderColor: getComputedStyle(document.documentElement).getPropertyValue('--surface-2').trim() || '#ffffff' }] },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '60%',
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: c => `${c.raw}  (${Math.round(c.raw/pieTotal*100)}%)` } }
        }
      }
    });
  }
}

  const mos = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('content').innerHTML = `
  <div class="export-sec">
    <div class="sec-title">匯出記錄</div>
    <button class="export-btn" onclick="exportCSV()">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <div>
        <div class="export-btn-label">匯出全部記錄（CSV）</div>
        <div class="export-btn-desc">可用 Excel 或 Numbers 開啟</div>
      </div>
    </button>
    <button class="export-btn" onclick="exportMonthCSV()">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <div>
        <div class="export-btn-label">匯出本月（${S.yr}年${mos[S.mo]}）</div>
        <div class="export-btn-desc">只包含當前顯示月份</div>
      </div>
    </button>
    <button class="export-btn" onclick="copyText()">
      <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <div>
        <div class="export-btn-label">複製本月摘要</div>
        <div class="export-btn-desc">純文字，方便貼到通訊軟體</div>
      </div>
    </button>
    <button class="export-btn" onclick="exportJSON()">
      <svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
      <div>
        <div class="export-btn-label">備份所有資料（JSON）</div>
        <div class="export-btn-desc">可還原或轉移到其他裝置</div>
      </div>
    </button>
    <p class="export-note">
      💡 iPhone 小貼士：下載後在「檔案」App 找到，<br>
      直接用 Numbers 開啟 CSV 即可製作圖表
    </p>
  </div>`;
}

/* ─── Export ─── */
function buildCSV(filterFn) {
  const rows = [['日期','餐別','食物','單價','數量','小計','備注']];
  Object.keys(S.data).sort().filter(filterFn || (() => true)).forEach(d => {
    entries(d).forEach(e => {
      const sub = (parseFloat(e.price)||0) * (parseInt(e.qty)||1);
      rows.push([d, e.meal, e.name, e.price||0, e.qty||1, sub.toFixed(1), e.note||'']);
    });
  });
  return rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
}
function downloadFile(content, filename, type) {
  const blob = new Blob(['\uFEFF'+content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 500);
}
function exportCSV() {
  downloadFile(buildCSV(), '飲食記錄_全部.csv', 'text/csv;charset=utf-8');
  showToast('已下載 CSV 檔案');
}
function exportMonthCSV() {
  const pfx = `${S.yr}-${String(S.mo+1).padStart(2,'0')}`;
  const mos = ['01月','02月','03月','04月','05月','06月','07月','08月','09月','10月','11月','12月'];
  downloadFile(buildCSV(d => d.startsWith(pfx)), `飲食記錄_${S.yr}年${mos[S.mo]}.csv`, 'text/csv;charset=utf-8');
  showToast('已下載本月 CSV');
}
function exportJSON() {
  downloadFile(JSON.stringify(S.data, null, 2), '飲食記錄備份.json', 'application/json');
  showToast('已下載備份檔案');
}
function copyText() {
  const pfx = `${S.yr}-${String(S.mo+1).padStart(2,'0')}`;
  const mos = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  let txt = `📋 ${S.yr}年${mos[S.mo]}飲食記錄\n${'─'.repeat(22)}\n`;
  let grand = 0;
  Object.keys(S.data).sort().filter(d => d.startsWith(pfx)).forEach(d => {
    const t = dayTotal(d); grand += t;
    const [,mo,da] = d.split('-');
    const wds = ['日','一','二','三','四','五','六'];
    
    // 核心修正：複製純文字時的星期計算也完全同步
    const dow = getDayOfWeek(d);
    txt += `\n${parseInt(mo)}/${parseInt(da)}（週${wds[dow]}）─ [ ${Math.round(t)} ]\n`;
    entries(d).forEach(e => {
      const sub = (parseFloat(e.price)||0)*(parseInt(e.qty)||1);
      txt += `  ${MEAL_ICONS[MEALS.indexOf(e.meal)]}${e.name}`;
      if (e.qty > 1) txt += ` x${e.qty}`;
      txt += `  ${Math.round(sub)}\n`;
    });
  });
  txt += `\n${'─'.repeat(22)}\n本月合計：${Math.round(grand)}`;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(() => showToast('已複製到剪貼板 ✓')).catch(() => showToast('複製失敗，請手動選取'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = txt; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); showToast('已複製到剪貼板 ✓'); } catch(e) { showToast('複製失敗'); }
    document.body.removeChild(ta);
  }
}

/* ─── Modal ─── */
function openModal(idx = -1) {
  S.editIndex = idx;
  
  if (idx > -1) {
    const item = S.data[S.selDate][idx];
    document.getElementById('modalTitle').textContent = '修改飲食記錄';
    document.getElementById('foodName').value = item.name;
    document.getElementById('foodPrice').value = item.price || '';
    document.getElementById('foodNote').value = item.note || '';
    S.meal = item.meal;
  } else {
    document.getElementById('modalTitle').textContent = '記錄飲食';
    document.getElementById('foodName').value = '';
    document.getElementById('foodPrice').value = '';
    document.getElementById('foodNote').value = '';
    S.meal = '午餐';
  }

  document.getElementById('mtRow').innerHTML = MEALS.map((m,i) =>
    `<button class="mt-btn${m===S.meal?' sel':''}" onclick="selMeal('${m}')">${MEAL_ICONS[i]}<br>${m}</button>`
  ).join('');
  
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(() => document.getElementById('foodName').focus(), 200);
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  S.editIndex = -1;
}
function closeIfOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}
function selMeal(m) {
  S.meal = m;
  document.querySelectorAll('.mt-btn').forEach((b,i) => b.classList.toggle('sel', MEALS[i] === m));
}
function saveEntry() {
  const name = document.getElementById('foodName').value.trim();
  if (!name) { document.getElementById('foodName').focus(); return; }
  
  const entryObj = {
    name, 
    meal: S.meal,
    price: parseFloat(document.getElementById('foodPrice').value) || 0,
    qty: 1,
    note: document.getElementById('foodNote').value.trim()
  };

  if (S.editIndex > -1) {
    S.data[S.selDate][S.editIndex] = entryObj;
    showToast(`已更新「${name}」✓`);
  } else {
    if (!S.data[S.selDate]) S.data[S.selDate] = [];
    S.data[S.selDate].push(entryObj);
    showToast(`已記錄「${name}」✓`);
  }
  
  save(); closeModal(); renderCal(); renderContent();
}
function delEntry(ds, idx) {
  if (!confirm('刪除這條記錄？')) return;
  const name = S.data[ds][idx].name;
  S.data[ds].splice(idx, 1);
  if (!S.data[ds].length) delete S.data[ds];
  save(); renderCal(); renderContent();
  showToast(`已刪除「${name}」`);
}

/* ─── Init ─── */
load();
renderCal();
renderContent();
</script>
